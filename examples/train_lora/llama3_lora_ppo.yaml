### model
model_name_or_path: models/prm/Mistral-7b-v0.3_sft_merged
# resume_from_checkpoint: saves/mistral-7b-v0.3/lora/ppo/prm
reward_model: saves/mistral-7b-v0.3/lora/reward/prm

### method
stage: ppo
do_train: true
finetuning_type: lora
lora_target: all
# deepspeed: examples/deepspeed/ds_z3_config.json

### dataset
dataset: prm-train
template: mistral
cutoff_len: 2048
# max_samples: 100
overwrite_cache: true
preprocessing_num_workers: 64

### output
output_dir: saves/mistral-7b-v0.3/lora/ppo-1201/prm
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 16
gradient_accumulation_steps: 32
learning_rate: 1.0e-5
num_train_epochs: 5.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

### generate
max_new_tokens: 8
top_k: 0
top_p: 0.9
