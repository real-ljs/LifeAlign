### model
model_name_or_path: /mnt/workspace2/models/Qwen2.5-7B-Instruct

### method
stage: rm
do_train: true
finetuning_type: lora
lora_target: all

# deepspeed: examples/deepspeed/ds_z3_config.json

### dataset
dataset: MeetingBank
template: qwen
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 4

### output
output_dir: saves/Qwen2.5-7B-Instruct/lora/reward/MeetingBank
logging_steps: 10
save_steps: 100
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 16
learning_rate: 1.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
report_to: none

### eval
# val_size: 0.1
eval_dataset: MeetingBank-test
per_device_eval_batch_size: 4
# eval_strategy: steps
eval_steps: 100
